---
# SPDX-FileCopyrightText: 2026 Alex Brandt <alunduil@gmail.com>
# SPDX-License-Identifier: MIT

name: Terraform Plan

on:
  pull_request:
    paths:
      - 'terraform/alunduil/**'
      - 'terraform/modules/**'
      - '.github/workflows/terraform-plan.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: '1.15.7'

      # Read-only deployer SA: plan refreshes state but never mutates GCP.
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_RO_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_RO_SERVICE_ACCOUNT_EMAIL }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      # App token spans every repo the github_repository module manages.
      - id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      # Cloudflare token lives in Secret Manager, not a GitHub secret; the RO
      # deployer SA holds secretAccessor on the -ro version only.
      - name: Export Cloudflare token
        run: |
          name=cloudflare-api-token-deployer-ro # pragma: allowlist secret
          value="$(gcloud secrets versions access latest \
            --secret="${name}" --project=alunduil)"
          echo "::add-mask::${value}"
          echo "TF_VAR_cloudflare_api_token=${value}" >> "${GITHUB_ENV}" # pragma: allowlist secret

      # Grafana provisioning has no read-only role, so the RO deployer reads the
      # same credentials the RW apply uses. Both secrets are populated by the
      # bootstrap layer. The App key is a multi-line PEM, so it is written with
      # GITHUB_ENV's heredoc form; both values go straight into GITHUB_ENV and
      # never reach the log.
      - name: Export Grafana credentials
        run: |
          sa_name=grafana-provisioner-token # pragma: allowlist secret
          key_name=grafana-git-sync-app-private-key # pragma: allowlist secret
          sa="$(gcloud secrets versions access latest \
            --secret="${sa_name}" --project=alunduil)"
          echo "::add-mask::${sa}"
          {
            echo "TF_VAR_grafana_service_account_token=${sa}" # pragma: allowlist secret
            echo "TF_VAR_grafana_git_sync_app_private_key<<__PEM__" # pragma: allowlist secret
            gcloud secrets versions access latest \
              --secret="${key_name}" --project=alunduil
            echo "__PEM__"
          } >> "${GITHUB_ENV}"

      - name: Terraform Init
        working-directory: terraform/alunduil
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform/alunduil
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          terraform plan -lock=false -no-color -out=tfplan
          terraform show -no-color tfplan > plan.txt

      - name: Comment PR with plan
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/alunduil/plan.txt', 'utf8');
            const m = plan.match(/^(No changes\..+|Plan: .+)$/m);
            const summary = m ? m[0] : 'Plan generated';
            const marker = '<!-- terraform-plan:alunduil -->';
            const body = [
              marker,
              '## terraform-plan',
              '',
              `**${summary}**`,
              '',
              '<details>',
              '<summary>Show full plan output</summary>',
              '',
              '```',
              plan,
              '```',
              '</details>',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
            });
            const hit = comments.find((c) => c.body.includes(marker));
            if (hit) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: hit.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body,
              });
            }

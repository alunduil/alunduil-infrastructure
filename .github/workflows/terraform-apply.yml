# SPDX-License-Identifier: MIT

name: Terraform Apply

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'terraform/alunduil/**'
      - 'terraform/modules/**'
      - '.github/workflows/terraform-apply.yml'

permissions:
  contents: read

# Serialize applies across all runs so two merges arriving close
# together don't race on the shared GCS state lock. cancel-in-progress
# is false: an in-flight apply holds the lock and must finish, not be
# interrupted mid-write and leave it orphaned.
concurrency:
  group: terraform-apply
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: '1.15.8'

      # Read-write deployer SA: gated to refs/heads/main by the WIF binding.
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_RW_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_RW_SERVICE_ACCOUNT_EMAIL }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      # RW deployer SA holds secretAccessor on the -rw token version only.
      - name: Export Cloudflare token
        run: |
          name=cloudflare-api-token-deployer-rw # pragma: allowlist secret
          value="$(gcloud secrets versions access latest \
            --secret="${name}" --project=alunduil)"
          echo "::add-mask::${value}"
          echo "TF_VAR_cloudflare_api_token=${value}" >> "${GITHUB_ENV}" # pragma: allowlist secret

      # Grafana provisioning has no read-only role, so plan and apply share the
      # same credentials. Both secrets are populated by the bootstrap layer. The
      # App key is a multi-line PEM, so it is written with GITHUB_ENV's heredoc
      # form; both values go straight into GITHUB_ENV and never reach the log.
      - name: Export Grafana credentials
        run: |
          sa_name=grafana-provisioner-token # pragma: allowlist secret
          key_name=grafana-git-sync-app-private-key # pragma: allowlist secret
          sa="$(gcloud secrets versions access latest \
            --secret="${sa_name}" --project=alunduil)"
          echo "::add-mask::${sa}"
          {
            echo "TF_VAR_grafana_service_account_token=${sa}" # pragma: allowlist secret
            echo "TF_VAR_grafana_git_sync_app_private_key<<__PEM__" # pragma: allowlist secret
            gcloud secrets versions access latest \
              --secret="${key_name}" --project=alunduil
            echo "__PEM__"
          } >> "${GITHUB_ENV}"

      - name: Terraform Init
        working-directory: terraform/alunduil
        run: terraform init

      # plan-then-apply (not apply direct) so the applied diff is the same
      # one the PR's terraform-plan comment showed.
      - name: Terraform Plan
        working-directory: terraform/alunduil
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: terraform plan -lock=false -no-color -out=tfplan

      - name: Terraform Apply
        working-directory: terraform/alunduil
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: terraform apply -auto-approve tfplan

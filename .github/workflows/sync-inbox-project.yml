name: sync-inbox-project

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Mirror open items into Inbox project
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Run sync script
        env:
          # Fine-grained PAT minted out-of-band and pushed via
          # scripts/configure-github-secrets.sh. See
          # docs/how-to/create-inbox-sync-token.md for the required
          # scopes.
          INBOX_SYNC_TOKEN: ${{ secrets.INBOX_SYNC_TOKEN }}
        run: ./scripts/sync-inbox-project.sh

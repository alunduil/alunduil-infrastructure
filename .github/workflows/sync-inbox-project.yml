name: sync-inbox-project

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Mirror open items into Inbox project
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Run sync script
        env:
          # Fine-grained PAT with read:project, project, read:org, and
          # repo (issues + pull-requests) across alunduil/,
          # dungeon-studio/, and qua-world/. The default GITHUB_TOKEN is
          # repo-scoped and cannot read other owners or write Projects v2.
          # Cross-owner search results respect token visibility; widen
          # scope (or swap to a classic PAT with `repo`) if private
          # items in other orgs need to land on the board.
          INBOX_SYNC_TOKEN: ${{ secrets.INBOX_SYNC_TOKEN }}
        run: ./scripts/sync-inbox-project.sh

name: pre-commit

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pre-commit:
    name: All hooks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Runs every pre-commit hook on all files. Terraform and just are
    # installed below for hooks that shell out to those binaries; the
    # rest are Python-based and handled by pre-commit/action.

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: '1.15.8'

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Run pre-commit hooks
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
        env:
          # no-commit-to-branch is a local guard and would always fail on
          # push to main — skip it in CI.
          SKIP: no-commit-to-branch

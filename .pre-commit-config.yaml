# Pre-commit hooks for code quality and consistency
# See https://pre-commit.com for more information

repos:
  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: ^docs/architecture/.*\.svg$
      - id: end-of-file-fixer
        exclude: ^docs/architecture/.*\.svg$
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: ^docs/architecture/.*\.svg$
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
        exclude: '\.jsonc$'
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-case-conflict
      - id: check-merge-conflict

  # Markdown linting
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2
        args: [--fix]

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [--strict]

  # Terraform formatting and validation
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_fmt
        args: [--args=-recursive]
      - id: terraform_validate
        args:
          - --tf-init-args=-backend=false

  # REUSE — SPDX license compliance
  - repo: https://github.com/fsfe/reuse-tool
    rev: v6.2.0
    hooks:
      - id: reuse
        always_run: true

  # Secrets detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets

  # Renovate config validation
  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 43.150.0
    hooks:
      - id: renovate-config-validator
        args: [--strict, --no-global]

  # Local hooks
  - repo: local
    hooks:
      - id: just-fmt-check
        name: just --fmt --check
        entry: just --fmt --check
        language: system
        files: ^justfile$
        pass_filenames: false

      # Regenerate docs/architecture/*.svg from workspace.dsl so the
      # committed diagram views stay in sync with the DSL.
      - id: architecture-export
        name: docs/architecture SVG export
        entry: scripts/architecture-export.sh
        language: system
        files: ^(docs/architecture/workspace\.dsl|scripts/architecture-export\.sh)$
        pass_filenames: false

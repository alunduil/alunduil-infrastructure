version = 1
SPDX-PackageName = "alunduil-infrastructure"
SPDX-PackageSupplier = "Alex Brandt <alunduil@gmail.com>"
SPDX-PackageDownloadLocation = "https://github.com/alunduil/alunduil-infrastructure"

# Generated by terraform init; no inline SPDX headers possible. Includes the
# lock file and the provider plugins downloaded under .terraform/ (which the
# terraform_validate pre-commit hook materialises on every run).
[[annotations]]
path = ["**/.terraform.lock.hcl", "**/.terraform/**"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Alex Brandt <alunduil@gmail.com>"
SPDX-License-Identifier = "MIT"

# Claude Code / claustre tooling files
[[annotations]]
path = [".claude/**", ".claustre_session_id"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Alex Brandt <alunduil@gmail.com>"
SPDX-License-Identifier = "MIT"

# JSON config files — JSON does not permit comments for inline headers
[[annotations]]
path = ["renovate.json", "scripts/sync-specs/*.json"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Alex Brandt <alunduil@gmail.com>"
SPDX-License-Identifier = "MIT"
